<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alerts — SmAArt City IoT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <style>
    @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
    .fade-in { animation: fadeIn .3s ease both; }
    .confidence-bar { transition: width .6s ease; }
  </style>
</head>
<body class="bg-slate-50 overflow-hidden">
<div class="flex h-screen" id="app">
  <div class="flex-1 flex flex-col overflow-hidden">

    <header class="bg-white border-b border-gray-100 px-6 h-14 flex items-center justify-between flex-shrink-0">
      <div>
        <h1 class="font-semibold text-gray-900 text-sm">Alerts</h1>
        <p class="text-xs text-gray-400">Ereignisse, Diagnosen & Wartungsworkflow</p>
      </div>
      <div class="flex items-center gap-2">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" id="search" placeholder="Alert suchen…" oninput="applyFilters()"
            class="pl-8 pr-4 py-1.5 text-xs bg-gray-50 border border-gray-200 rounded-lg w-52 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button onclick="loadAlerts()" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-5 space-y-4">

      <!-- KPI row -->
      <div class="grid grid-cols-4 gap-3 fade-in">
        <div class="bg-white rounded-2xl ring-1 ring-gray-100 shadow-sm p-4">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Gesamt</p>
          <p class="text-3xl font-bold text-gray-900 mt-1.5 tabular-nums" id="c-total">—</p>
        </div>
        <div class="bg-white rounded-2xl ring-1 ring-gray-100 shadow-sm p-4">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Offen</p>
          <p class="text-3xl font-bold text-orange-500 mt-1.5 tabular-nums" id="c-unresolved">—</p>
        </div>
        <div class="bg-white rounded-2xl ring-1 ring-gray-100 shadow-sm p-4">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Kritisch</p>
          <p class="text-3xl font-bold text-red-500 mt-1.5 tabular-nums" id="c-critical">—</p>
        </div>
        <div class="bg-white rounded-2xl ring-1 ring-gray-100 shadow-sm p-4">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Gelöst</p>
          <p class="text-3xl font-bold text-emerald-600 mt-1.5 tabular-nums" id="c-resolved24">—</p>
        </div>
      </div>

      <!-- Filters + Tabs -->
      <div class="bg-white rounded-2xl ring-1 ring-gray-100 shadow-sm fade-in" style="animation-delay:.05s">
        <div class="px-5 pt-3 pb-0 flex items-center justify-between border-b border-gray-100">
          <div class="flex gap-0.5">
            <button onclick="setTab('all')"        id="tab-all"        class="px-4 py-2.5 text-xs font-semibold border-b-2 border-gray-900 text-gray-900 -mb-px">Alle <span id="tab-all-count"        class="ml-1 bg-gray-100 text-gray-600 text-xs rounded-full px-1.5 py-0.5"></span></button>
            <button onclick="setTab('unresolved')" id="tab-unresolved" class="px-4 py-2.5 text-xs font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-700 -mb-px transition-colors">Offen <span id="tab-unresolved-count" class="ml-1 bg-gray-100 text-gray-600 text-xs rounded-full px-1.5 py-0.5"></span></button>
            <button onclick="setTab('resolved')"   id="tab-resolved"   class="px-4 py-2.5 text-xs font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-700 -mb-px transition-colors">Gelöst <span id="tab-resolved-count"   class="ml-1 bg-gray-100 text-gray-600 text-xs rounded-full px-1.5 py-0.5"></span></button>
          </div>
          <div class="flex items-center gap-2 pb-2">
            <select id="filter-severity" onchange="applyFilters()" class="text-xs border border-gray-200 rounded-lg px-2 py-1 text-gray-600 focus:outline-none">
              <option value="">Alle Dringlichkeiten</option>
              <option value="critical">🔴 Critical</option>
              <option value="medium">🟡 Warning</option>
              <option value="low">🟢 Info</option>
            </select>
            <select id="filter-cause" onchange="applyFilters()" class="text-xs border border-gray-200 rounded-lg px-2 py-1 text-gray-600 focus:outline-none">
              <option value="">Alle Ursachen</option>
              <option value="battery">🔋 Batterie</option>
              <option value="connectivity">📡 Konnektivität</option>
              <option value="gateway">🌐 Gateway</option>
              <option value="hardware">⚙️ Hardware</option>
              <option value="software">🧠 Software</option>
            </select>
          </div>
        </div>

        <div id="alert-list" class="divide-y divide-gray-50">
          <div class="p-10 text-center text-xs text-gray-400">Lade Alerts…</div>
        </div>
      </div>

    </main>
  </div>
</div>

<script>
  document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('alerts'));
  loadAlertBadge();

  let currentTab = 'all';
  let allData    = null;

  const SEV_CONFIG = {
    critical: { label: '🔴 Critical', bg: 'bg-red-50',    text: 'text-red-600',    ring: 'ring-red-200',   border: '#EF4444', iconBg: '#FEF2F2', iconStroke: '#EF4444' },
    medium:   { label: '🟡 Warning',  bg: 'bg-amber-50',  text: 'text-amber-700',  ring: 'ring-amber-200', border: '#F59E0B', iconBg: '#FFFBEB', iconStroke: '#F59E0B' },
    low:      { label: '🟢 Info',     bg: 'bg-blue-50',   text: 'text-blue-600',   ring: 'ring-blue-200',  border: '#3B82F6', iconBg: '#EFF6FF', iconStroke: '#3B82F6' },
  };
  const STATUS_PILL = {
    open:        '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-orange-50 text-orange-600 ring-1 ring-orange-200">Offen</span>',
    in_progress: '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-blue-50 text-blue-600 ring-1 ring-blue-200">In Bearbeitung</span>',
    resolved:    '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200">✓ Gelöst</span>',
  };
  const ROOT_LABEL = { battery:'🔋 Batterie', connectivity:'📡 Konnektivität', gateway:'🌐 Gateway/Netzwerk', hardware:'⚙️ Hardware', software:'🧠 Software/Firmware' };

  function confidenceBar(pct, color) {
    const w = Math.min(100, pct);
    return `<div class="flex items-center gap-2 mt-1.5">
      <div class="flex-1 h-1 bg-gray-100 rounded-full overflow-hidden" style="max-width:120px">
        <div class="h-full rounded-full confidence-bar" style="width:${w}%;background:${color}"></div>
      </div>
      <span class="text-xs font-semibold" style="color:${color}">${pct}% Konfidenz</span>
    </div>`;
  }

  function renderAlerts(alerts) {
    const el = document.getElementById('alert-list');
    if (!alerts || !alerts.length) {
      el.innerHTML = `<div class="py-14 text-center">
        <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center mx-auto mb-3">
          <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <p class="text-sm text-gray-500 font-medium">Keine Alerts</p>
      </div>`;
      return;
    }
    el.innerHTML = alerts.map(a => {
      const cfg = SEV_CONFIG[a.severity] || SEV_CONFIG.low;
      const affectedBadge = a.affected_count > 1
        ? `<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600">${a.affected_count} Sensoren betroffen</span>`
        : '';
      const assignee = a.assigned_to
        ? `<span class="text-xs text-gray-500">👤 ${a.assigned_to}</span>`
        : `<span class="text-xs text-gray-400">Nicht zugewiesen</span>`;

      return `<div class="px-5 py-4 hover:bg-gray-50/40 transition-colors" id="alert-row-${a.id}">
        <div class="flex items-start gap-4">
          <!-- Icon -->
          <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5" style="background:${cfg.iconBg}">
            <span class="text-base">${a.root_cause_icon}</span>
          </div>

          <!-- Main content -->
          <div class="flex-1 min-w-0">
            <!-- Top row: badges + time -->
            <div class="flex items-center gap-2 flex-wrap mb-1.5">
              <span class="px-2 py-0.5 rounded-full text-xs font-semibold ring-1 ${cfg.bg} ${cfg.text} ${cfg.ring}">${cfg.label}</span>
              ${STATUS_PILL[a.status] || STATUS_PILL.open}
              ${affectedBadge}
              <span class="text-xs text-gray-400 ml-auto">${a.created_ago}</span>
            </div>

            <!-- Message -->
            <p class="text-sm font-semibold text-gray-900 leading-snug">${a.message}</p>
            <p class="text-xs text-gray-500 mt-1 leading-relaxed">${a.explanation}</p>

            <!-- Root cause + confidence -->
            <div class="mt-2 flex items-start gap-6 flex-wrap">
              <div>
                <p class="text-xs text-gray-400 font-medium">Ursache</p>
                <p class="text-xs text-gray-700 font-semibold mt-0.5">${ROOT_LABEL[a.root_cause] || a.root_cause}</p>
                ${confidenceBar(a.confidence, cfg.iconStroke)}
              </div>
              <!-- Recommended action -->
              <div class="flex-1 min-w-0">
                <p class="text-xs text-gray-400 font-medium">Empfohlene Maßnahme</p>
                <p class="text-xs text-gray-700 mt-0.5 leading-relaxed">${a.recommended_action}</p>
              </div>
            </div>

            <!-- Maintenance footer -->
            <div class="mt-3 pt-2.5 border-t border-gray-50 flex items-center gap-4">
              ${assignee}
              ${a.status !== 'resolved' ? `
              <button onclick="acknowledgeAlert(${a.id})" class="ml-auto text-xs px-3 py-1 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 hover:border-gray-300 transition-colors">
                Schließen
              </button>` : `<span class="ml-auto text-xs text-gray-400">Gelöst ${a.resolved_at ? _timeAgo(a.resolved_at) : ''}</span>`}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function _timeAgo(iso) {
    if (!iso) return '';
    const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (s < 60) return `vor ${s}s`;
    const m = Math.floor(s/60); if (m < 60) return `vor ${m} min`;
    const h = Math.floor(m/60); if (h < 24) return `vor ${h}h`;
    return `vor ${Math.floor(h/24)}d`;
  }

  function applyFilters() {
    if (!allData) return;
    const search   = document.getElementById('search').value.toLowerCase();
    const fSev     = document.getElementById('filter-severity').value;
    const fCause   = document.getElementById('filter-cause').value;
    let alerts = allData[currentTab] || [];
    if (search)  alerts = alerts.filter(a => a.message.toLowerCase().includes(search) || a.sensor_name.toLowerCase().includes(search));
    if (fSev)    alerts = alerts.filter(a => a.severity === fSev);
    if (fCause)  alerts = alerts.filter(a => a.root_cause === fCause);
    renderAlerts(alerts);
  }

  function setTab(tab) {
    currentTab = tab;
    ['all','unresolved','resolved'].forEach(t => {
      document.getElementById('tab-'+t).className = t === tab
        ? 'px-4 py-2.5 text-xs font-semibold border-b-2 border-gray-900 text-gray-900 -mb-px'
        : 'px-4 py-2.5 text-xs font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-700 -mb-px transition-colors';
    });
    applyFilters();
  }

  async function acknowledgeAlert(id) {
    const row = document.getElementById('alert-row-' + id);
    if (row) { row.style.opacity = '0.35'; row.style.pointerEvents = 'none'; }
  }

  async function loadAlerts() {
    const [all, unresolved, resolved] = await Promise.all([
      dbGetAlerts('all'), dbGetAlerts('unresolved'), dbGetAlerts('resolved'),
    ]);
    document.getElementById('c-total').textContent      = all.total;
    document.getElementById('c-unresolved').textContent = all.unresolved;
    document.getElementById('c-critical').textContent   = all.critical;
    document.getElementById('c-resolved24').textContent = all.resolved_24h;
    document.getElementById('tab-all-count').textContent        = all.total;
    document.getElementById('tab-unresolved-count').textContent = all.unresolved;
    document.getElementById('tab-resolved-count').textContent   = resolved.alerts ? resolved.alerts.length : 0;
    allData = { all: all.alerts, unresolved: unresolved.alerts, resolved: resolved.alerts };
    applyFilters();
  }

  document.addEventListener('DOMContentLoaded', loadAlerts);
</script>
</body>
</html>
