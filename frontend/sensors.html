<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensors — SmAArt City IoT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <style>
    @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
    .fade-in { animation: fadeIn .3s ease both; }
    .sensor-row:hover { background:#F8FAFC; }
  </style>
</head>
<body class="bg-slate-50 overflow-hidden">
<div class="flex h-screen" id="app">
  <div class="flex-1 flex flex-col overflow-hidden">

    <header class="bg-white border-b border-gray-100 px-6 h-14 flex items-center justify-between flex-shrink-0">
      <div>
        <h1 class="font-semibold text-gray-900 text-sm">Sensors</h1>
        <p class="text-xs text-gray-400">Alle IoT-Geräte im Netzwerk · Aalen</p>
      </div>
      <div class="flex items-center gap-2">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" id="search" placeholder="Sensor suchen…" oninput="applyFilters()"
            class="pl-8 pr-4 py-1.5 text-xs bg-gray-50 border border-gray-200 rounded-lg w-52 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button onclick="loadSensors()" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-5">
      <div class="bg-white rounded-2xl ring-1 ring-gray-100 shadow-sm fade-in">

        <!-- Filters -->
        <div class="px-5 py-3 flex items-center gap-3 border-b border-gray-50 flex-wrap">
          <svg class="w-3.5 h-3.5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
          <select id="filter-type" onchange="applyFilters()" class="text-xs border-0 bg-transparent text-gray-600 focus:outline-none cursor-pointer">
            <option value="">Alle Typen</option>
            <option value="parking">Parking</option>
            <option value="weather">Weather Station</option>
            <option value="environmental">Environmental</option>
            <option value="air_quality">Air Quality</option>
          </select>
          <div class="w-px h-4 bg-gray-200"></div>
          <select id="filter-location" onchange="applyFilters()" class="text-xs border-0 bg-transparent text-gray-600 focus:outline-none cursor-pointer">
            <option value="">Alle Standorte</option>
          </select>
          <div class="w-px h-4 bg-gray-200"></div>
          <select id="filter-status" onchange="applyFilters()" class="text-xs border-0 bg-transparent text-gray-600 focus:outline-none cursor-pointer">
            <option value="">Alle Status</option>
            <option value="online">🟢 Online</option>
            <option value="unstable">🟡 Unstable</option>
            <option value="offline">🔴 Offline</option>
          </select>
          <div class="w-px h-4 bg-gray-200"></div>
          <select id="filter-battery" onchange="applyFilters()" class="text-xs border-0 bg-transparent text-gray-600 focus:outline-none cursor-pointer">
            <option value="">Alle Batterien</option>
            <option value="healthy">🟢 Healthy (>30%)</option>
            <option value="warning">🟡 Warning (15–30%)</option>
            <option value="critical">🔴 Critical (&lt;15%)</option>
          </select>
          <span class="ml-auto text-xs text-gray-400" id="sensor-count">—</span>
        </div>

        <!-- Table -->
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-50">
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wide">Sensor</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wide">Typ</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wide">Standort</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wide">Status</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wide">Aktuelle Werte</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wide w-52">Batterie</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wide">Zuletzt</th>
              </tr>
            </thead>
            <tbody id="sensor-table-body" class="divide-y divide-gray-50">
              <tr><td colspan="7" class="px-5 py-10 text-center text-xs text-gray-400">Lade Sensoren…</td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </main>
  </div>
</div>

<script>
  document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('sensors'));
  loadAlertBadge();

  let allSensors = [];

  const TYPE_ICONS = {
    parking:       { bg: '#EFF6FF', stroke: '#2563EB', d: 'M17 16v2a2 2 0 01-2 2H5a2 2 0 01-2-2v-2m4-6h8m-4-4v10' },
    weather:       { bg: '#F0F9FF', stroke: '#0369A1', d: 'M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z' },
    environmental: { bg: '#F0FDF4', stroke: '#16A34A', d: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' },
    air_quality:   { bg: '#FDF4FF', stroke: '#9333EA', d: 'M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.14 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0' },
  };

  const BATT_CONFIG = {
    healthy:  { color: '#10B981', text: 'text-emerald-600', label: 'Healthy' },
    warning:  { color: '#F59E0B', text: 'text-amber-600',   label: 'Warning' },
    critical: { color: '#EF4444', text: 'text-red-500',     label: 'Critical' },
  };

  function typeIcon(type) {
    const c = TYPE_ICONS[type] || { bg: '#F9FAFB', stroke: '#6B7280', d: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' };
    return `<div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:${c.bg}">
      <svg class="w-3.5 h-3.5" fill="none" stroke="${c.stroke}" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="${c.d}"/></svg>
    </div>`;
  }

  function readingsBadges(readings) {
    if (!readings || !readings.length) return '<span class="text-xs text-gray-400">—</span>';
    return readings.slice(0, 2).map(r => {
      if (!r.value && r.value !== 0) return '';
      const display = r.unit ? `${r.value} ${r.unit}` : r.value;
      return `<span class="inline-block text-xs font-medium text-gray-700 bg-gray-50 ring-1 ring-gray-200 rounded-lg px-2 py-0.5">${r.param}: <strong>${display}</strong></span>`;
    }).join(' ');
  }

  function batteryCell(s) {
    if (s.battery_pct === null || s.battery_pct === undefined) {
      return '<span class="text-xs text-gray-400">Keine Daten</span>';
    }
    const cfg = BATT_CONFIG[s.battery_health] || BATT_CONFIG.healthy;
    return `<div>
      <div class="flex items-center gap-2 mb-1">
        <div class="h-1.5 rounded-full bg-gray-100 overflow-hidden" style="width:72px">
          <div class="h-full rounded-full" style="width:${s.battery_pct}%;background:${cfg.color}"></div>
        </div>
        <span class="text-xs font-semibold ${cfg.text}">${s.battery_pct}%</span>
        <span class="text-xs text-gray-400">${s.battery_voltage}V</span>
      </div>
      <p class="text-xs text-gray-400 leading-tight">${s.battery_lifetime}</p>
    </div>`;
  }

  function renderTable(sensors) {
    const tbody = document.getElementById('sensor-table-body');
    const countEl = document.getElementById('sensor-count');
    if (!sensors.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="px-5 py-10 text-center text-xs text-gray-400">Keine Sensoren gefunden</td></tr>';
      countEl.textContent = '0 Sensoren';
      return;
    }
    countEl.textContent = `${sensors.length} Sensor${sensors.length !== 1 ? 'en' : ''}`;
    tbody.innerHTML = sensors.map(s => `
      <tr class="sensor-row transition-colors cursor-default">
        <td class="px-5 py-3">
          <div class="flex items-center gap-2.5">
            ${typeIcon(s.type)}
            <div>
              <p class="text-xs font-semibold text-gray-900 leading-tight">${s.name}</p>
              <p class="text-xs text-gray-400 font-mono mt-0.5">${s.unique_id}</p>
            </div>
          </div>
        </td>
        <td class="px-4 py-3"><span class="text-xs text-gray-600">${typeLabel(s.type)}</span></td>
        <td class="px-4 py-3"><span class="text-xs text-gray-600 truncate max-w-32 block">${s.location}</span></td>
        <td class="px-4 py-3">${statusBadge(s.status)}</td>
        <td class="px-4 py-3">
          <div class="flex flex-wrap gap-1">
            ${readingsBadges(s.readings)}
          </div>
        </td>
        <td class="px-4 py-3">${batteryCell(s)}</td>
        <td class="px-4 py-3"><span class="text-xs text-gray-500">${s.last_seen_ago}</span></td>
      </tr>
    `).join('');
  }

  function applyFilters() {
    const search  = document.getElementById('search').value.toLowerCase();
    const fType   = document.getElementById('filter-type').value;
    const fLoc    = document.getElementById('filter-location').value;
    const fStatus = document.getElementById('filter-status').value;
    const fBatt   = document.getElementById('filter-battery').value;

    const filtered = allSensors.filter(s => {
      if (search && !s.name.toLowerCase().includes(search) && !(s.unique_id||'').toLowerCase().includes(search) && !(s.location||'').toLowerCase().includes(search)) return false;
      if (fType   && s.type !== fType) return false;
      if (fLoc    && s.location !== fLoc) return false;
      if (fStatus && s.status !== fStatus) return false;
      if (fBatt   && s.battery_health !== fBatt) return false;
      return true;
    });
    renderTable(filtered);
  }

  async function loadSensors() {
    allSensors = await dbGetSensors();
    const locs = [...new Set(allSensors.map(s => s.location).filter(Boolean))].sort();
    const locSel = document.getElementById('filter-location');
    locSel.innerHTML = '<option value="">Alle Standorte</option>' +
      locs.map(l => `<option value="${l}">${l}</option>`).join('');
    applyFilters();
  }

  document.addEventListener('DOMContentLoaded', loadSensors);
</script>
</body>
</html>
