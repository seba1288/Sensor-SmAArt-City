<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locations — Sensor-SmAArt-City</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <style>#map { z-index: 1; }</style>
</head>
<body class="bg-gray-50 overflow-hidden">
  <div class="flex h-screen" id="app">

    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Header -->
      <header class="bg-white border-b border-gray-100 px-6 h-16 flex items-center justify-between flex-shrink-0">
        <div>
          <h1 class="font-semibold text-gray-900">Locations</h1>
          <p class="text-xs text-gray-500">Districts, zones and sensor coverage</p>
        </div>
        <div class="flex items-center gap-3">
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" placeholder="Search sensors, locations..." class="pl-9 pr-4 py-2 text-sm bg-gray-50 border border-gray-200 rounded-lg w-64 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          <button onclick="loadLocations()" class="p-2 rounded-lg hover:bg-gray-50 text-gray-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          </button>
          <button onclick="window.location.href='alerts.html'" class="relative p-2 rounded-lg hover:bg-gray-50 text-gray-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          </button>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-6 space-y-5">
        <!-- Map -->
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
          <div class="px-5 py-4">
            <h2 class="font-semibold text-gray-900">Sensor density across districts</h2>
          </div>
          <div id="map" style="height:320px;"></div>
          <div class="px-5 py-3 border-t border-gray-50 flex gap-5">
            <span class="flex items-center gap-1.5 text-xs text-gray-500"><span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>Online</span>
            <span class="flex items-center gap-1.5 text-xs text-gray-500"><span class="w-2 h-2 rounded-full bg-yellow-400 inline-block"></span>Warning</span>
            <span class="flex items-center gap-1.5 text-xs text-gray-500"><span class="w-2 h-2 rounded-full bg-red-500 inline-block"></span>Offline</span>
          </div>
        </div>

        <!-- District Network Uptime -->
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
          <h2 class="font-semibold text-gray-900 mb-1">District Network Uptime</h2>
          <p class="text-xs text-gray-500 mb-4">Active sensors ÷ deployed sensors</p>
          <div id="uptime-bars" class="space-y-3">
            <div class="text-sm text-gray-400">Loading…</div>
          </div>
        </div>

        <!-- District cards grid -->
        <div>
          <h2 class="font-semibold text-gray-900 mb-3">All Locations</h2>
          <div id="district-cards" class="grid grid-cols-3 gap-4">
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 text-sm text-gray-400">Loading…</div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('locations'));
    loadAlertBadge();

    let leafletMap = null;

    function uptimeColor(pct) {
      if (pct >= 90) return '#10B981';
      if (pct >= 70) return '#F59E0B';
      return '#EF4444';
    }

    function uptimeBadgeClass(pct) {
      if (pct >= 90) return 'bg-green-100 text-green-700';
      if (pct >= 70) return 'bg-yellow-100 text-yellow-700';
      return 'bg-red-100 text-red-700';
    }

    function initMap(sensors) {
      if (!leafletMap) {
        leafletMap = L.map('map', { zoomControl: true }).setView([48.837, 10.093], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(leafletMap);
      }
      leafletMap.eachLayer(l => { if (l instanceof L.CircleMarker) leafletMap.removeLayer(l); });

      const COLOR = { online: '#10B981', warning: '#F59E0B', critical: '#EF4444', offline: '#EF4444' };
      const bounds = [];
      sensors.forEach(s => {
        bounds.push([s.lat, s.lng]);
        L.circleMarker([s.lat, s.lng], {
          radius: 8, fillColor: COLOR[s.status] || '#6B7280',
          color: '#fff', weight: 2, fillOpacity: 0.9,
        }).addTo(leafletMap).bindPopup(
          `<b>${s.name}</b><br>Type: ${typeLabel(s.type)}<br>Status: ${s.status}`
        );
      });
      if (bounds.length > 1) leafletMap.fitBounds(bounds, { padding: [30, 30] });
    }

    async function loadLocations() {
      try {
        const data = await dbGetLocations();
        const { locations, map_sensors } = data;

        // Map
        if (map_sensors && map_sensors.length > 0) initMap(map_sensors);

        // Uptime bars — show top 8
        const top = [...locations].sort((a, b) => b.total - a.total).slice(0, 8);
        const uptimeEl = document.getElementById('uptime-bars');
        if (top.length === 0) {
          uptimeEl.innerHTML = '<p class="text-sm text-gray-400">No location data available</p>';
        } else {
          uptimeEl.innerHTML = top.map(loc => `
            <div class="flex items-center gap-3">
              <span class="text-sm text-gray-700 w-40 truncate flex-shrink-0">${loc.name}</span>
              <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full rounded-full transition-all duration-500"
                  style="width:${loc.uptime}%;background:${uptimeColor(loc.uptime)}"></div>
              </div>
              <span class="text-sm font-semibold text-gray-700 w-10 text-right flex-shrink-0">${loc.uptime}%</span>
            </div>
          `).join('');
        }

        // District cards
        const cardsEl = document.getElementById('district-cards');
        if (locations.length === 0) {
          cardsEl.innerHTML = '<p class="text-sm text-gray-400 col-span-3">No districts found</p>';
        } else {
          cardsEl.innerHTML = locations.map(loc => `
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
              <div class="flex items-start justify-between mb-3">
                <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
                  <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                </div>
                <span class="text-sm font-bold px-2.5 py-1 rounded-lg ${uptimeBadgeClass(loc.uptime)}">${loc.uptime}%</span>
              </div>
              <h3 class="font-semibold text-gray-900 truncate">${loc.name}</h3>
              <div class="mt-3 flex items-center gap-4 text-sm text-gray-500">
                <div class="flex items-center gap-1.5">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
                  <span>Total <strong class="text-gray-900">${loc.total}</strong></span>
                </div>
                <div class="flex items-center gap-1.5">
                  <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.14 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/></svg>
                  <span>Online <strong class="text-gray-900">${loc.online}</strong></span>
                </div>
              </div>
              <div class="mt-3 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full rounded-full" style="width:${loc.uptime}%;background:${uptimeColor(loc.uptime)}"></div>
              </div>
              <button onclick="window.location.href='sensors.html'"
                class="mt-4 w-full py-2 text-sm font-medium text-gray-700 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
                View Sensors
              </button>
            </div>
          `).join('');
        }
      } catch(e) {
        document.getElementById('district-cards').innerHTML =
          '<div class="col-span-3 p-8 text-center text-red-400 text-sm">Failed to load locations. Is the Flask server running?</div>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadLocations);
  </script>
</body>
</html>
